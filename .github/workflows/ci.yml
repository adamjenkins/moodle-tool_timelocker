name: Moodle Plugin CI

on: [push, pull_request]

jobs:
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Compute test matrix
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Reduced matrix for PRs: latest Moodle branch only, both databases, both supported PHP versions.
            echo 'matrix={"include":[
              {"php":"8.3","moodle-branch":"MOODLE_502_STABLE","database":"pgsql"},
              {"php":"8.3","moodle-branch":"MOODLE_502_STABLE","database":"mariadb"},
              {"php":"8.4","moodle-branch":"MOODLE_502_STABLE","database":"pgsql"},
              {"php":"8.4","moodle-branch":"MOODLE_502_STABLE","database":"mariadb"}
            ]}' | tr -d '\n' >> "$GITHUB_OUTPUT"
          else
            # Full matrix on push: every supported PHP version against every supported Moodle branch and DB.
            # Per each branch's own version block in (public/)admin/environment.xml, the minimum PHP is
            # 8.2.0 for 500/501 and 8.3.0 for 502. PHP 8.2 is therefore excluded only for 502.
            # Re-verify against environment.xml before changing this.
            echo 'matrix={"php":["8.2","8.3","8.4"],"moodle-branch":["MOODLE_500_STABLE","MOODLE_501_STABLE","MOODLE_502_STABLE"],"database":["pgsql","mariadb"],"exclude":[{"php":"8.2","moodle-branch":"MOODLE_502_STABLE"}]}' >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: matrix-setup
    runs-on: ubuntu-latest

    services:
      postgres:
        # Per each branch's own version block in (public/)admin/environment.xml, the minimum
        # PostgreSQL is 14 (500), 15 (501), 16 (502). One image is shared across the whole
        # matrix, so it must satisfy the strictest of the three (502's 16). Re-verify against
        # environment.xml before bumping this down.
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

      mariadb:
        # MariaDB 10.11 is the minimum for all three branches (500/501/502).
        image: mariadb:10.11
        env:
          MYSQL_USER: root
          MYSQL_ALLOW_EMPTY_PASSWORD: 'true'
          MYSQL_CHARACTER_SET_SERVER: utf8mb4
          MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          ini-values: max_input_vars=5000
          coverage: none

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: '18.20'

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ runner.os }}-php${{ matrix.php }}-moodle-plugin-ci-v4
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-
            composer-${{ runner.os }}-

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci && pwd)/bin >> $GITHUB_PATH
          echo "$(cd ci && pwd)/vendor/bin" >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> $GITHUB_ENV

      - name: Install Moodle
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phplint

      - name: PHP Copy/Paste Detector
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpcpd
        continue-on-error: true

      - name: PHP Mess Detector
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpmd
        continue-on-error: true

      - name: Moodle Code Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci codechecker

      - name: Moodle PHPDoc Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpdoc
        continue-on-error: true

      - name: Validating
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci mustache

      - name: Grunt
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci grunt

      - name: PHPUnit tests
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpunit

      - name: Behat features
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci behat --profile chrome

      - name: Upload Behat faildump
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: behat-faildump-${{ matrix.moodle-branch }}-${{ matrix.php }}-${{ matrix.database }}
          path: ${{ github.workspace }}/moodledata/behat_dump
          if-no-files-found: ignore
